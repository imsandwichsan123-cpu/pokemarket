<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PokeMarket V2</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

nav button{
margin-left:10px;
padding:8px 15px;
border:none;
border-radius:5px;
background:#38bdf8;
}

.container{
padding:40px;
}

.search{
margin-bottom:30px;
}

.search input{
padding:10px;
width:250px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:15px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 15px #38bdf8;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:18px;
}

.rarity{
font-size:14px;
color:#facc15;
}

.cart{
position:fixed;
right:0;
top:0;
height:100%;
width:320px;
background:#020617;
padding:20px;
overflow:auto;
}

.hidden{
display:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:30px;
border-radius:10px;
width:350px;
text-align:center;
}

.admin{
background:#020617;
padding:20px;
margin-top:40px;
}

input{
padding:10px;
margin:5px;
width:90%;
}

</style>
</head>

<body>

<header>

<div class="logo">PokeMarket</div>

<nav>

<button onclick="toggleCart()">Kosár</button>
<button onclick="openAdmin()">Admin</button>

</nav>

</header>

<div class="container">

<div class="search">

<input id="search" placeholder="Keresés..." oninput="renderCards()">

</div>

<div class="cards" id="cards"></div>

<div class="admin hidden" id="adminPanel">

<h2>Admin Panel</h2>

<input id="name" placeholder="Kártya neve">
<input id="price" placeholder="Ár">
<input id="year" placeholder="Év">
<input id="rarity" placeholder="Ritkaság">
<input id="img" placeholder="Kép URL">

<button onclick="addCard()">Kártya hozzáadása</button>

<h3 id="stats"></h3>

</div>

</div>

<div class="cart hidden" id="cart">

<h2>Kosár</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

</div>

<div class="modal hidden" id="cardModal">

<div class="modalContent">

<h2 id="modalName"></h2>

<img id="modalImg" width="200">

<p id="modalYear"></p>

<p id="modalRarity"></p>

<p id="modalPrice"></p>

<button onclick="addToCart()">Kosárba</button>

<br><br>

<button onclick="closeModal()">Bezár</button>

</div>

</div>

<div class="modal hidden" id="adminLogin">

<div class="modalContent">

<h2>Admin Login</h2>

<input id="adminPass" type="password">

<button onclick="loginAdmin()">Belépés</button>

</div>

</div>

<script>

let cards=[
{
name:"Charizard GX",
price:120,
year:2019,
rarity:"Ultra Rare",
img:"https://images.pokemontcg.io/base1/4.png"
},
{
name:"Pikachu",
price:40,
year:2021,
rarity:"Common",
img:"https://images.pokemontcg.io/base1/58.png"
}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let selected=null
let sales=0

function renderCards(){

let container=document.getElementById("cards")
let search=document.getElementById("search").value.toLowerCase()

container.innerHTML=""

cards.filter(c=>c.name.toLowerCase().includes(search))
.forEach((c,i)=>{

container.innerHTML+=`

<div class="card" onclick="openCard(${i})">

<img src="${c.img}">

<h3>${c.name}</h3>

<div class="rarity">${c.rarity}</div>

<div class="price">$${c.price}</div>

</div>

`

})

}

renderCards()

function openCard(i){

selected=cards[i]

document.getElementById("modalName").innerText=selected.name
document.getElementById("modalImg").src=selected.img
document.getElementById("modalYear").innerText="Év: "+selected.year
document.getElementById("modalRarity").innerText="Ritkaság: "+selected.rarity
document.getElementById("modalPrice").innerText="Ár: $"+selected.price

document.getElementById("cardModal").classList.remove("hidden")

}

function closeModal(){

document.getElementById("cardModal").classList.add("hidden")

}

function addToCart(){

cart.push(selected)

sales++

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("hidden")

}

function updateCart(){

let c=document.getElementById("cartItems")
c.innerHTML=""

let total=0

cart.forEach((item,i)=>{

c.innerHTML+=`
<p>
${item.name} - $${item.price}
<button onclick="removeItem(${i})">X</button>
</p>
`

total+=Number(item.price)

})

document.getElementById("total").innerText="Összesen: $"+total

document.getElementById("stats").innerText="Eladások: "+sales

}

updateCart()

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function openAdmin(){

document.getElementById("adminLogin").classList.remove("hidden")

}

function loginAdmin(){

let pass=document.getElementById("adminPass").value

if(pass==="pokemonadmin"){

document.getElementById("adminLogin").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

}

else{

alert("Rossz jelszó")

}

}

function addCard(){

let n=document.getElementById("name").value
let p=document.getElementById("price").value
let y=document.getElementById("year").value
let r=document.getElementById("rarity").value
let i=document.getElementById("img").value

cards.push({
name:n,
price:p,
year:y,
rarity:r,
img:i
})

renderCards()

}

</script>

</body>
</html>
