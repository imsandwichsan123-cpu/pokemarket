<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PokeMarket</title>

<link rel="icon" href="logo.png">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#1c1c1c;
}

.logo{
font-size:28px;
font-weight:bold;
color:#ffd900;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cartBtn{background:#ffd900;}
.adminBtn{background:#555;color:white;}

.categories{
display:flex;
gap:10px;
padding:10px;
background:#191919;
}

.cat{
background:#333;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e1e1e;
border-radius:10px;
padding:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:6px;
}

.stock{
color:#00ff88;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

.close{
float:right;
cursor:pointer;
}

.cartPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#1c1c1c;
padding:20px;
transition:0.3s;
}

.cartPanel.open{
right:0;
}

</style>
</head>

<body>

<header>

<div class="logo">⚡ PokeMarket</div>

<div>
<button class="cartBtn" onclick="openCart()">🛒 Cart</button>
<button class="adminBtn" onclick="openAdmin()">Admin</button>
</div>

</header>

<div class="categories">

<div class="cat" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('electric')">⚡ Electric</div>
<div class="cat" onclick="filter('dark')">🌑 Dark</div>

</div>

<div class="grid" id="cards"></div>

<!-- CART -->

<div class="cartPanel" id="cart">

<h2>🛒 Cart</h2>

<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="closeCart()">Close</button>

</div>

<!-- ADMIN LOGIN -->

<div class="modal" id="adminModal">

<div class="modalContent">

<span class="close" onclick="closeAdmin()">❌</span>

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<script>

let adminPassword="admin123"

let cart=[]

let cards=[

{
name:"Pikachu V",
price:15,
type:"electric",
stock:2,
img:"https://images.pokemontcg.io/swshp/SWSH063.png"
},

{
name:"Surfing Pikachu V",
price:18,
type:"electric",
stock:1,
img:"https://images.pokemontcg.io/celebrations/8.png"
},

{
name:"Pikachu GX",
price:22,
type:"electric",
stock:1,
img:"https://images.pokemontcg.io/sm3/33.png"
},

{
name:"Raichu GX",
price:20,
type:"electric",
stock:1,
img:"https://images.pokemontcg.io/sm213/SM213.png"
},

{
name:"Umbreon V",
price:35,
type:"dark",
stock:1,
img:"https://images.pokemontcg.io/swsh7/94.png"
},

{
name:"Pikachu & Zekrom GX",
price:45,
type:"electric",
stock:1,
img:"https://images.pokemontcg.io/sm168/SM168.png"
}

]

function render(list){

let grid=document.getElementById("cards")

grid.innerHTML=""

list.forEach((c,i)=>{

grid.innerHTML+=`

<div class="card">

<img src="${c.img}">

<h3>${c.name}</h3>

<p>$${c.price}</p>

<p class="stock">Stock: ${c.stock}</p>

<button onclick="add(${i})">Add to cart</button>

</div>

`

})

}

function filter(type){

if(type==="all") render(cards)

else{

let f=cards.filter(c=>c.type===type)

render(f)

}

}

function add(i){

if(cards[i].stock<=0){

alert("Out of stock")

return

}

cart.push(cards[i])

cards[i].stock--

updateCart()

render(cards)

}

function updateCart(){

let el=document.getElementById("cartItems")

let total=0

el.innerHTML=""

cart.forEach(c=>{

total+=c.price

el.innerHTML+=`<p>${c.name} - $${c.price}</p>`

})

document.getElementById("total").innerText=total

}

function openCart(){

document.getElementById("cart").classList.add("open")

}

function closeCart(){

document.getElementById("cart").classList.remove("open")

}

function openAdmin(){

document.getElementById("adminModal").style.display="flex"

}

function closeAdmin(){

document.getElementById("adminModal").style.display="none"

}

function login(){

let pass=document.getElementById("adminPass").value

if(pass===adminPassword){

alert("Admin panel coming soon")

closeAdmin()

}else{

alert("Wrong password")

}

}

render(cards)

</script>

</body>
</html>
