<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeMarket V4 PRO</title>

<!-- Favicon -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

button{
cursor:pointer;
border:none;
padding:8px 15px;
border-radius:6px;
background:#38bdf8;
margin-left:5px;
}

.container{
padding:40px;
}

.searchBar{
margin-bottom:25px;
}

input,select{
padding:10px;
margin-right:10px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #38bdf8;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:18px;
}

.rarity{
color:#facc15;
font-size:14px;
}

.cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#020617;
padding:20px;
overflow:auto;
display:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:25px;
border-radius:10px;
width:340px;
text-align:center;
}

.admin{
background:#020617;
padding:20px;
margin-top:40px;
display:none;
}

.review{
color:#94a3b8;
font-size:14px;
}
</style>
</head>

<body>

<header>

<div class="logo">PokeMarket</div>

<div>
<button onclick="toggleCart()">Kosár</button>
<button onclick="openAdmin()">Admin</button>
</div>

</header>

<div class="container">

<div class="searchBar">

<input id="search" placeholder="Keresés..." oninput="renderCards()">

<select id="rarityFilter" onchange="renderCards()">
<option value="">Minden ritkaság</option>
<option>Common</option>
<option>Rare</option>
<option>Ultra Rare</option>
</select>

</div>

<div class="cards" id="cards"></div>

<div class="admin" id="adminPanel">

<h2>Admin Panel</h2>

<input id="name" placeholder="Kártya neve">
<input id="price" placeholder="Ár">
<input id="year" placeholder="Év">
<input id="rarity" placeholder="Ritkaság">
<input id="img" placeholder="Kép URL">
<input id="desc" placeholder="Leírás">
<input id="rating" placeholder="Értékelés (★★★★★)">

<button onclick="addCard()">Kártya hozzáadása</button>

<h3 id="stats"></h3>

</div>

</div>

<div class="cart" id="cart">

<h2>Kosár</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

</div>

<div class="modal" id="cardModal">

<div class="modalContent">

<h2 id="modalName"></h2>

<img id="modalImg" width="200">

<p id="modalYear"></p>

<p id="modalRarity"></p>

<p id="modalDesc"></p>

<p id="modalRating"></p>

<p id="modalPrice"></p>

<button onclick="addToCart()">Kosárba</button>
<br><br>
<button onclick="closeModal()">Bezár</button>

</div>

</div>

<div class="modal" id="adminLogin">

<div class="modalContent">

<h2>Admin Login</h2>

<input id="adminPass" type="password">

<button onclick="loginAdmin()">Belépés</button>

</div>

</div>

<script>

let currency="$"
let rate=1

async function detectCurrency(){

try{

let res=await fetch("https://ipapi.co/json/")
let data=await res.json()

if(data.country==="HU"){
currency="Ft"
rate=360
}

else if(data.country==="JP"){
currency="¥"
rate=150
}

else{
currency="$"
rate=1
}

renderCards()
updateCart()

}catch{}

}

detectCurrency()

let cards=[
{
name:"Charizard GX",
price:120,
year:2019,
rarity:"Ultra Rare",
desc:"Erős tűz Pokémon kártya",
rating:"★★★★★",
img:"https://images.pokemontcg.io/base1/4.png"
},
{
name:"Pikachu",
price:40,
year:2021,
rarity:"Common",
desc:"Ikonikus Pokémon",
rating:"★★★★",
img:"https://images.pokemontcg.io/base1/58.png"
}
]

let cart=JSON.parse(localStorage.getItem("cart"))||[]
let selected=null
let sales=0

function renderCards(){

let container=document.getElementById("cards")
let search=document.getElementById("search").value.toLowerCase()
let rarity=document.getElementById("rarityFilter").value

container.innerHTML=""

cards
.filter(c=>c.name.toLowerCase().includes(search))
.filter(c=>rarity=="" || c.rarity==rarity)
.forEach((c,i)=>{

container.innerHTML+=`

<div class="card" onclick="openCard(${i})">

<img src="${c.img}">

<h3>${c.name}</h3>

<div class="rarity">${c.rarity}</div>

<div class="price">${Math.round(c.price*rate)} ${currency}</div>

<div class="review">${c.rating}</div>

</div>

`

})

}

renderCards()

function openCard(i){

selected=cards[i]

modalName.innerText=selected.name
modalImg.src=selected.img
modalYear.innerText="Év: "+selected.year
modalRarity.innerText="Ritkaság: "+selected.rarity
modalDesc.innerText=selected.desc
modalRating.innerText="Értékelés: "+selected.rating
modalPrice.innerText="Ár: "+Math.round(selected.price*rate)+" "+currency

cardModal.style.display="flex"

}

function closeModal(){
cardModal.style.display="none"
}

function addToCart(){

cart.push(selected)
sales++

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function toggleCart(){

let cartBox=document.getElementById("cart")

cartBox.style.display=cartBox.style.display=="block"?"none":"block"

}

function updateCart(){

let c=document.getElementById("cartItems")

c.innerHTML=""

let total=0

cart.forEach((item,i)=>{

c.innerHTML+=`
<p>${item.name} - ${Math.round(item.price*rate)} ${currency}
<button onclick="removeItem(${i})">X</button></p>
`

total+=Number(item.price)

})

document.getElementById("total").innerText="Összesen: "+Math.round(total*rate)+" "+currency
document.getElementById("stats").innerText="Eladások: "+sales

}

updateCart()

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function openAdmin(){
adminLogin.style.display="flex"
}

function loginAdmin(){

let pass=document.getElementById("adminPass").value.trim()

if(pass==="pokemonadmin"){

adminLogin.style.display="none"
adminPanel.style.display="block"

}

else{
alert("Rossz jelszó")
}

}

function addCard(){

let n=name.value
let p=price.value
let y=year.value
let r=rarity.value
let i=img.value
let d=desc.value
let rating=window.rating.value

cards.push({
name:n,
price:p,
year:y,
rarity:r,
img:i,
desc:d,
rating:rating
})

renderCards()

}

</script>

</body>
</html>
