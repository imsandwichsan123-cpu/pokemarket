<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PokeMarket</title>

<link rel="icon" href="logo.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#181818;
}

.logo{
font-size:26px;
font-weight:bold;
color:#ffd800;
}

button{
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.cartBtn{background:#ffd800;}
.adminBtn{background:#444;color:white;}

.search{
padding:8px;
border-radius:6px;
border:none;
}

.categories{
display:flex;
gap:10px;
padding:10px;
background:#151515;
}

.cat{
background:#333;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:12px;
border-radius:10px;
text-align:center;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:6px;
}

.stock{
color:#00ff88;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#222;
padding:20px;
border-radius:10px;
width:320px;
}

.close{
float:right;
cursor:pointer;
}

.cartPanel{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#1c1c1c;
padding:20px;
transition:0.3s;
}

.cartPanel.open{
right:0;
}

</style>
</head>

<body>

<header>

<div class="logo">⚡ PokeMarket</div>

<div>

<input class="search" placeholder="Search card..." onkeyup="search(this.value)">

<button class="cartBtn" onclick="openCart()">🛒</button>

<button class="adminBtn" onclick="openAdmin()">Admin</button>

</div>

</header>

<div class="categories">

<div class="cat" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('electric')">⚡ Electric</div>
<div class="cat" onclick="filter('dark')">🌑 Dark</div>

</div>

<div class="grid" id="cards"></div>

<!-- CART -->

<div class="cartPanel" id="cart">

<h2>🛒 Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="closeCart()">Close</button>

</div>

<!-- ADMIN -->

<div class="modal" id="adminModal">

<div class="modalContent">

<span class="close" onclick="closeAdmin()">❌</span>

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- CARD INFO -->

<div class="modal" id="infoModal">

<div class="modalContent">

<span class="close" onclick="closeInfo()">❌</span>

<div id="infoContent"></div>

</div>

</div>

<script>

let adminPassword="admin123"

let cart=[]

let cards=[

{
name:"Pikachu V",
price:15,
type:"electric",
stock:2,
year:2020,
img:"https://images.pokemontcg.io/swsh4/43.png"
},

{
name:"Surfing Pikachu VMAX",
price:25,
type:"electric",
stock:1,
year:2021,
img:"https://images.pokemontcg.io/celebrations/9.png"
},

{
name:"Flying Pikachu VMAX",
price:26,
type:"electric",
stock:1,
year:2021,
img:"https://images.pokemontcg.io/celebrations/7.png"
},

{
name:"Pikachu GX",
price:22,
type:"electric",
stock:1,
year:2018,
img:"https://images.pokemontcg.io/sm3/33.png"
},

{
name:"Raichu GX",
price:20,
type:"electric",
stock:1,
year:2019,
img:"https://images.pokemontcg.io/sm213/SM213.png"
},

{
name:"Umbreon V",
price:35,
type:"dark",
stock:1,
year:2021,
img:"https://images.pokemontcg.io/swsh7/94.png"
},

{
name:"Pikachu & Zekrom GX",
price:45,
type:"electric",
stock:1,
year:2019,
img:"https://images.pokemontcg.io/sm168/SM168.png"
}

]

function render(list){

let grid=document.getElementById("cards")

grid.innerHTML=""

list.forEach((c,i)=>{

grid.innerHTML+=`

<div class="card">

<img src="${c.img}" onclick="info(${i})">

<h3>${c.name}</h3>

<p>$${c.price}</p>

<p class="stock">Stock: ${c.stock}</p>

<button onclick="add(${i})">Add to cart</button>

</div>

`

})

}

function info(i){

let c=cards[i]

document.getElementById("infoContent").innerHTML=`

<h2>${c.name}</h2>

<img src="${c.img}" style="width:100%">

<p>Price: $${c.price}</p>

<p>Type: ${c.type}</p>

<p>Year: ${c.year}</p>

<p>Stock: ${c.stock}</p>

`

document.getElementById("infoModal").style.display="flex"

}

function closeInfo(){

document.getElementById("infoModal").style.display="none"

}

function filter(type){

if(type==="all") render(cards)

else render(cards.filter(c=>c.type===type))

}

function search(text){

let t=text.toLowerCase()

render(cards.filter(c=>c.name.toLowerCase().includes(t)))

}

function add(i){

if(cards[i].stock<=0){

alert("Out of stock")

return

}

cart.push(cards[i])

cards[i].stock--

updateCart()

render(cards)

}

function updateCart(){

let el=document.getElementById("cartItems")

let total=0

el.innerHTML=""

cart.forEach(c=>{

total+=c.price

el.innerHTML+=`<p>${c.name} - $${c.price}</p>`

})

document.getElementById("total").innerText=total

}

function openCart(){

document.getElementById("cart").classList.add("open")

}

function closeCart(){

document.getElementById("cart").classList.remove("open")

}

function openAdmin(){

document.getElementById("adminModal").style.display="flex"

}

function closeAdmin(){

document.getElementById("adminModal").style.display="none"

}

function login(){

let pass=document.getElementById("adminPass").value

if(pass===adminPassword){

alert("Admin panel coming in V8")

closeAdmin()

}else{

alert("Wrong password")

}

}

render(cards)

</script>

</body>
</html>
