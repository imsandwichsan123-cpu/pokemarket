<!DOCTYPE html>
<html lang="hu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PokeMarket V5</title>

<link rel="icon" href="logo.png">

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
transition:0.3s;
}

.light{
background:white;
color:black;
}

header{
background:#020617;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#38bdf8;
}

button{
cursor:pointer;
border:none;
padding:8px 14px;
border-radius:6px;
background:#38bdf8;
margin-left:5px;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:15px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #38bdf8;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:18px;
}

.rarity{
color:#facc15;
font-size:14px;
}

.cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#020617;
padding:20px;
overflow:auto;
display:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:25px;
border-radius:10px;
width:340px;
text-align:center;
}

input{
padding:10px;
margin:5px;
width:90%;
}

.review{
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<header>

<div class="logo">PokeMarket</div>

<div>

<button onclick="toggleCart()">Kosár</button>
<button onclick="toggleTheme()">🌙</button>
<button onclick="openLogin()">Login</button>
<button onclick="openAdmin()">Admin</button>

</div>

</header>

<div class="container">

<input id="search" placeholder="Keresés..." oninput="renderCards()">

<div class="cards" id="cards"></div>

</div>

<div class="cart" id="cart">

<h2>Kosár</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="checkout()">Checkout</button>

</div>
<div class="modal" id="loginModal">

<div class="modalContent">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="openRegister()">Register</button>

</div>

</div>


<div class="modal" id="registerModal">

<div class="modalContent">

<h2>Register</h2>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Create Account</button>

</div>

</div>
<script>

let currency="$"
let rate=1

async function detectCurrency(){

try{

let res=await fetch("https://ipapi.co/json/")
let data=await res.json()

if(data.country==="HU"){
currency="Ft"
rate=360
}

else if(data.country==="JP"){
currency="¥"
rate=150
}

}catch{}

}

detectCurrency()

let cards=[

{
name:"Charizard GX",
price:120,
rarity:"Ultra Rare",
img:"https://images.pokemontcg.io/base1/4.png",
rating:"★★★★★"
},

{
name:"Pikachu",
price:40,
rarity:"Common",
img:"https://images.pokemontcg.io/base1/58.png",
rating:"★★★★"
}

]

let cart=JSON.parse(localStorage.getItem("cart"))||[]

function renderCards(){

let container=document.getElementById("cards")
let search=document.getElementById("search").value.toLowerCase()

container.innerHTML=""

cards.filter(c=>c.name.toLowerCase().includes(search))
.forEach((c,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${c.img}">

<h3>${c.name}</h3>

<div class="rarity">${c.rarity}</div>

<div class="price">${Math.round(c.price*rate)} ${currency}</div>

<div class="review">${c.rating}</div>

<button onclick="addToCart(${i})">Kosár</button>

</div>

`

})

}

renderCards()

function addToCart(i){

cart.push(cards[i])

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function toggleCart(){

let c=document.getElementById("cart")

c.style.display=c.style.display=="block"?"none":"block"

}

function updateCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0

cart.forEach((item,i)=>{

items.innerHTML+=`
<p>
${item.name} - ${Math.round(item.price*rate)} ${currency}
<button onclick="removeItem(${i})">X</button>
</p>
`

total+=item.price

})

document.getElementById("total").innerText="Total: "+Math.round(total*rate)+" "+currency

}

updateCart()

function removeItem(i){

cart.splice(i,1)

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function openLogin(){
loginModal.style.display="flex"
}

function openRegister(){
registerModal.style.display="flex"
}

function register(){

let user=regUser.value
let pass=regPass.value

localStorage.setItem("user_"+user,pass)

alert("Account created!")

}

function login(){

let user=loginUser.value
let pass=loginPass.value

let stored=localStorage.getItem("user_"+user)

if(stored===pass){

alert("Login successful")

loginModal.style.display="none"

}else{

alert("Wrong login")

}

}

function checkout(){

alert("Rendelés elküldve (demo)")

cart=[]

localStorage.setItem("cart","[]")

updateCart()

}

</script>

</body>
</html>
