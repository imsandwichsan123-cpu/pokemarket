<!DOCTYPE html>
<html>

<head>

<title>PokeMarket</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

header{
background:#ffcb05;
padding:20px;
text-align:center;
}

header h1{
margin:0;
}

.container{
padding:20px;
}

.search{
margin-bottom:20px;
}

.search input{
padding:10px;
width:300px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#3b4cca;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<header>
<h1>PokeMarket</h1>
<p>Pokemon kártya webshop</p>
</header>

<div class="cart">
Kosár: <span id="cartCount">0</span>
</div>

<div class="container">

<div class="search">
<input type="text" id="searchInput" placeholder="Kártya keresése..." onkeyup="searchCards()">
</div>

<div class="cards" id="cardList"></div>

</div>

<script>

let cards = [

{
name:"Pikachu",
price:5000,
img:"https://images.pokemontcg.io/base1/58.png"
},

{
name:"Charizard",
price:25000,
img:"https://images.pokemontcg.io/base1/4.png"
},

{
name:"Mewtwo",
price:15000,
img:"https://images.pokemontcg.io/base1/10.png"
}

]

let cart = []

function displayCards(list){

let container = document.getElementById("cardList")

container.innerHTML=""

list.forEach((card,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${card.img}">

<h3>${card.name}</h3>

<p>${card.price} Ft</p>

<button onclick="addToCart(${i})">Kosárba</button>

</div>

`

})

}

function addToCart(i){

cart.push(cards[i])

document.getElementById("cartCount").innerText=cart.length

}

function searchCards(){

let search=document.getElementById("searchInput").value.toLowerCase()

let filtered=cards.filter(card=>card.name.toLowerCase().includes(search))

displayCards(filtered)

}

displayCards(cards)

</script>

</body>

</html>
