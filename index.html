<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemarket</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Arial', sans-serif; background:#f0f2f5; display:flex; flex-direction:column; align-items:center; min-height:100vh; }

header { background:#ffcc00; width:100%; text-align:center; padding:20px 0; font-size:2em; font-weight:bold; position:relative; }
#onlineUsers { position:absolute; right:20px; top:50%; transform:translateY(-50%); font-size:0.8em; color:#333; }

.logo { max-width:200px; margin:0 auto 10px; display:block; }

.search { margin:20px; text-align:center; }
.search input { width:250px; padding:8px; font-size:1em; border-radius:5px; border:1px solid #ccc; }

.card-list { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin:20px; }
.card { background:#fff; border-radius:15px; padding:15px; width:220px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.2); transition:transform 0.2s; }
.card:hover { transform:scale(1.05); }
.card img { width:100%; border-radius:10px; }
.card h3 { margin:10px 0 5px; }
.card p { font-size:0.9em; color:#555; }
.card button { margin-top:10px; padding:8px 15px; background:#ff6600; color:#fff; border:none; border-radius:8px; cursor:pointer; transition:background 0.2s; }
.card button:hover { background:#e65500; }

/* Kosár popup */
.cart-container { position:fixed; top:20px; right:20px; z-index:1000; }
.cart-btn { background:#ff6600; color:#fff; border:none; border-radius:8px; padding:10px 15px; cursor:pointer; font-weight:bold; }
.cart-popup { background:#fff; padding:15px; border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.3); width:250px; max-height:400px; overflow-y:auto; display:none; }
.cart-popup ul { list-style:none; padding:0; margin:0 0 10px 0; }
.cart-popup li { display:flex; justify-content:space-between; margin-bottom:5px; }
.cart-popup li button { background:red; color:#fff; border:none; border-radius:5px; padding:2px 5px; cursor:pointer; }

.admin-link { position:fixed; bottom:20px; right:20px; background:#333; color:#fff; padding:8px 12px; border-radius:5px; text-decoration:none; }

.admin-page { max-width:600px; margin:50px auto; background:#fff; padding:20px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
.admin-page input, .admin-page button { margin:5px 0; padding:8px; width:100%; border-radius:5px; border:1px solid #ccc; }
.admin-page button { background:#ff6600; color:#fff; border:none; cursor:pointer; transition:background 0.2s; }
.admin-page button:hover { background:#e65500; }
</style>
</head>
<body>

<header>
  pokemarket
  <span id="onlineUsers">0 users online</span>
</header>

<img src="pokemarket_logo.png" alt="Pokemarket Logo" class="logo">

<div class="search">
  <input type="text" id="searchInput" placeholder="Keresés kártya név vagy set szerint...">
</div>

<div class="card-list" id="cardList"></div>

<!-- Kosár popup -->
<div class="cart-container">
  <button id="cartToggle" class="cart-btn">Kosár 🛒 (<span id="cartCount">0</span>)</button>
  <div id="cartPopup" class="cart-popup">
    <h3>Kosár</h3>
    <ul id="cartItems"></ul>
    <p>Teljes ár: <span id="totalPrice">0</span> Ft</p>
    <button id="checkoutBtn">Rendelés</button>
    <button id="closeCart">Bezárás</button>
  </div>
</div>

<a href="#admin" class="admin-link">Admin</a>

<div id="admin" class="admin-page" style="display:none;">
  <h2>Admin felület</h2>
  <input type="password" id="adminPass" placeholder="Jelszó">
  <button id="loginBtn">Belépés</button>
  
  <div id="adminContent" style="display:none;">
    <h3>Új kártya feltöltése</h3>
    <input type="text" id="newName" placeholder="Név">
    <input type="text" id="newSet" placeholder="Set">
    <input type="text" id="newPrice" placeholder="Ár">
    <input type="text" id="newDesc" placeholder="Leírás">
    <input type="text" id="newImg" placeholder="Kép URL">
    <button id="addCardBtn">Hozzáadás</button>
    <h3>Jelenlegi kártyák</h3>
    <ul id="adminCardList"></ul>
  </div>
</div>

<script>
let initialCards = [
  {name:"Pikachu", set:"Base", price:1000, desc:"Villám erejű kis Pokémon", img:"https://assets.pokemon.com/assets/cms2/img/cards/web/SM/SM01/SM01_EN_25.png"},
  {name:"Charizard", set:"Base", price:15000, desc:"Tűzlehelet királya", img:"https://assets.pokemon.com/assets/cms2/img/cards/web/XY/XY1/XY1_EN_6.png"},
  {name:"Bulbasaur", set:"Base", price:1200, desc:"Növénypokémon", img:"https://assets.pokemon.com/assets/cms2/img/cards/web/SM/SM01/SM01_EN_1.png"}
];

let cards = JSON.parse(localStorage.getItem('cards')) || initialCards;
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const cardList = document.getElementById('cardList');
const searchInput = document.getElementById('searchInput');

function renderCards(filter="") {
  cardList.innerHTML = "";
  cards.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()) || c.set.toLowerCase().includes(filter.toLowerCase()))
    .forEach((card,i)=>{
      const div = document.createElement('div');
      div.className="card";
      div.innerHTML = `
        <img src="${card.img}" alt="${card.name}">
        <h3>${card.name}</h3>
        <p>${card.desc}</p>
        <p>Ár: ${card.price} Ft</p>
        <button onclick="addToCart(${i})">Megveszem</button>
      `;
      cardList.appendChild(div);
    });
}

searchInput.addEventListener('input', e=>renderCards(e.target.value));
renderCards();

// Kosár popup funkció
const cartToggle = document.getElementById('cartToggle');
const cartPopup = document.getElementById('cartPopup');
const closeCart = document.getElementById('closeCart');
const cartCount = document.getElementById('cartCount');
const totalPriceEl = document.getElementById('totalPrice');
const cartItemsEl = document.getElementById('cartItems');
const checkoutBtn = document.getElementById('checkoutBtn');

function renderCartPopup(){
  cartItemsEl.innerHTML = '';
  let total = 0;
  cart.forEach((item,i)=>{
    total += item.price * item.qty;
    const li = document.createElement('li');
    li.innerHTML = `${item.name} (${item.qty}) - ${item.price*item.qty} Ft
                    <div>
                      <button onclick="decreaseQty(${i})">-</button>
                      <button onclick="increaseQty(${i})">+</button>
                      <button onclick="removeItem(${i})">x</button>
                    </div>`;
    cartItemsEl.appendChild(li);
  });
  cartCount.textContent = cart.reduce((a,b)=>a+b.qty,0);
  totalPriceEl.textContent = total;
}

function addToCart(index){
  const card = cards[index];
  const existing = cart.find(c => c.name===card.name);
  if(existing) existing.qty+=1;
  else cart.push({...card, qty:1});
  updateCart();
}

function increaseQty(i){ cart[i].qty+=1; updateCart(); }
function decreaseQty(i){ if(cart[i].qty>1){ cart[i].qty-=1; updateCart(); } }
function removeItem(i){ cart.splice(i,1); updateCart(); }
function updateCart(){ localStorage.setItem('cart', JSON.stringify(cart)); renderCartPopup(); }

cartToggle.addEventListener('click', ()=>{ cartPopup.style.display = 'block'; });
closeCart.addEventListener('click', ()=>{ cartPopup.style.display = 'none'; });

checkoutBtn.addEventListener('click', ()=>{
  if(cart.length===0){ alert("A kosár üres!"); return; }
  let info = prompt("Add meg a neved és email címed (pl. Név,email):");
  if(info){
    alert("Rendelés elküldve banki utalással. Kártyák: "+cart.map(c=>c.name+" x"+c.qty).join(", ")+"\nAdatok: "+info);
    cart=[];
    updateCart();
    cartPopup.style.display = 'none';
  }
});

renderCartPopup();

// Admin
const adminPass = "admin123";
const adminDiv = document.getElementById('admin');
const loginBtn = document.getElementById('loginBtn');
const adminContent = document.getElementById('adminContent');
const adminCardList = document.getElementById('adminCardList');

loginBtn.addEventListener('click', ()=>{
  if(document.getElementById('adminPass').value===adminPass){
    adminContent.style.display="block";
    renderAdminCards();
  } else alert("Hibás jelszó!");
});

function renderAdminCards(){
  adminCardList.innerHTML="";
  cards.forEach((c,i)=>{
    const li=document.createElement('li');
    li.textContent=`${c.name} - ${c.price} Ft `;
    const del=document.createElement('button');
    del.textContent="Törlés";
    del.onclick=()=>{ cards.splice(i,1); localStorage.setItem('cards', JSON.stringify(cards)); renderCards(); renderAdminCards(); updateCart();}
    li.appendChild(del);
    adminCardList.appendChild(li);
  });
}

document.getElementById('addCardBtn').addEventListener('click', ()=>{
  const name=document.getElementById('newName').value;
  const set=document.getElementById('newSet').value;
  const price=parseInt(document.getElementById('newPrice').value);
  const desc=document.getElementById('newDesc').value;
  const img=document.getElementById('newImg').value;
  if(name && set && price && desc && img){
    cards.push({name,set,price,desc,img});
    localStorage.setItem('cards', JSON.stringify(cards));
    renderCards();
    renderAdminCards();
    updateCart();
    document.getElementById('newName').value="";
    document.getElementById('newSet').value="";
    document.getElementById('newPrice').value="";
    document.getElementById('newDesc').value="";
    document.getElementById('newImg').value="";
  } else alert("Minden mezőt ki kell tölteni!");
});

document.querySelector('.admin-link').addEventListener('click', e=>{
  e.preventDefault();
  adminDiv.style.display="block";
  adminDiv.scrollIntoView();
});

// Online users
const onlineEl = document.getElementById('onlineUsers');
function updateOnline(){ onlineEl.textContent = Math.floor(Math.random()*50+1)+" users online"; }
setInterval(updateOnline,5000);
updateOnline();
</script>

</body>
</html>
