<!DOCTYPE html>
<html>

<head>

<title>PokeMarket</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#ffcb05;
padding:20px;
text-align:center;
}

.logo{
height:90px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#3b4cca;
color:white;
}

.topbar input{
padding:10px;
width:200px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.buy{
background:#3b4cca;
color:white;
}

.cartPanel{
position:fixed;
right:0;
top:0;
width:340px;
height:100%;
background:white;
padding:20px;
overflow:auto;
display:none;
box-shadow:-5px 0 20px rgba(0,0,0,0.3);
}

.adminPanel{
position:fixed;
left:0;
top:0;
width:320px;
height:100%;
background:#222;
color:white;
padding:20px;
display:none;
overflow:auto;
}

.review{
background:white;
padding:10px;
margin:10px;
border-radius:8px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

textarea{
width:300px;
height:60px;
}

.stats{
background:white;
margin:20px;
padding:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<p>Pokemon kártya webshop</p>

</header>

<div class="topbar">

<input id="search" placeholder="Kártya keresése..." onkeyup="searchCards()">

<div>

🛒 <span id="cartCount">0</span>

<button onclick="toggleCart()">Kosár</button>

<button onclick="openAdmin()">Admin</button>

</div>

</div>

<div id="cards" class="cards"></div>

<div class="cartPanel" id="cartPanel">

<h2>Kosár</h2>

<div id="cartItems"></div>

<h3 id="totalPrice"></h3>

<button onclick="checkout()">Rendelés</button>

</div>

<div class="adminPanel" id="adminPanel">

<h2>Admin panel</h2>

<input id="adminPass" placeholder="jelszó">

<button onclick="loginAdmin()">Belépés</button>

<div id="adminControls" style="display:none">

<h3>Új kártya hozzáadása</h3>

<input id="cardName" placeholder="név">

<input id="cardPrice" placeholder="ár">

<input id="cardImg" placeholder="kép link">

<button onclick="addCard()">Hozzáadás</button>

</div>

</div>

<div class="stats">

<h2>📊 Ár statisztika</h2>

<p>Összes kártya: <span id="statCards"></span></p>

<p>Átlag ár: <span id="avgPrice"></span> Ft</p>

</div>

<h2 style="padding-left:20px">⭐ Vásárlói értékelések</h2>

<div id="reviews"></div>

<div style="padding:20px">

<textarea id="reviewText"></textarea>
<br>
<button onclick="addReview()">Értékelés küldése</button>

</div>

<script>

let cards=[

{name:"Charizard",price:25000,img:"https://images.pokemontcg.io/base1/4.png"},

{name:"Pikachu",price:5000,img:"https://images.pokemontcg.io/base1/58.png"},

{name:"Mewtwo",price:15000,img:"https://images.pokemontcg.io/base1/10.png"}

]

let cart=[]
let reviews=[]

function displayCards(list){

let container=document.getElementById("cards")

container.innerHTML=""

list.forEach((card,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${card.img}">

<h3>${card.name}</h3>

<p>${card.price} Ft</p>

<button class="buy" onclick="addCart(${i})">Kosárba</button>

</div>

`

})

updateStats()

}

function addCart(i){

cart.push(cards[i])

document.getElementById("cartCount").innerText=cart.length

updateCart()

}

function updateCart(){

let container=document.getElementById("cartItems")

container.innerHTML=""

let total=0

cart.forEach(c=>{

container.innerHTML+=`<p>${c.name} - ${c.price} Ft</p>`

total+=c.price

})

document.getElementById("totalPrice").innerText="Összesen: "+total+" Ft"

}

function toggleCart(){

let panel=document.getElementById("cartPanel")

panel.style.display=panel.style.display=="block"?"none":"block"

}

function checkout(){

alert("Rendelés elküldve! Fizetés banki utalással.")

}

function searchCards(){

let s=document.getElementById("search").value.toLowerCase()

let filtered=cards.filter(c=>c.name.toLowerCase().includes(s))

displayCards(filtered)

}

function openAdmin(){

document.getElementById("adminPanel").style.display="block"

}

function loginAdmin(){

let pass=document.getElementById("adminPass").value

if(pass=="pokemonadmin"){

document.getElementById("adminControls").style.display="block"

}else{

alert("Hibás jelszó")

}

}

function addCard(){

let name=document.getElementById("cardName").value

let price=document.getElementById("cardPrice").value

let img=document.getElementById("cardImg").value

cards.push({name:name,price:parseInt(price),img:img})

displayCards(cards)

}

function addReview(){

let text=document.getElementById("reviewText").value

reviews.push(text)

displayReviews()

}

function displayReviews(){

let container=document.getElementById("reviews")

container.innerHTML=""

reviews.forEach(r=>{

container.innerHTML+=`<div class="review">⭐ ${r}</div>`

})

}

function updateStats(){

document.getElementById("statCards").innerText=cards.length

let total=0

cards.forEach(c=>total+=c.price)

document.getElementById("avgPrice").innerText=Math.round(total/cards.length)

}

displayCards(cards)

</script>

</body>

</html>
