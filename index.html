<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>PokeMarket</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

button{
cursor:pointer;
}

.container{
padding:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

.card{
background:#1e293b;
border-radius:15px;
padding:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#38bdf8;
font-size:18px;
}

.cart{
position:fixed;
right:0;
top:0;
height:100%;
width:320px;
background:#020617;
padding:20px;
overflow:auto;
}

.hidden{
display:none;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
justify-content:center;
align-items:center;
}

.modalContent{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
padding:10px;
margin:5px;
width:90%;
}

.adminPanel{
background:#020617;
padding:20px;
margin-top:40px;
}

.review{
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<header>

<div class="logo">PokeMarket</div>

<div>

<button onclick="toggleCart()">Kosár</button>
<button onclick="openAdmin()">Admin</button>

</div>

</header>

<div class="container">

<div class="cards" id="cards"></div>

<div class="adminPanel hidden" id="adminPanel">

<h2>Admin Panel</h2>

<input id="name" placeholder="Kártya neve">
<input id="price" placeholder="Ár">
<input id="year" placeholder="Év">
<input id="img" placeholder="Kép URL">

<button onclick="addCard()">Kártya hozzáadása</button>

</div>

</div>

<div class="cart hidden" id="cart">

<h2>Kosár</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

</div>

<div class="modal hidden" id="cardModal">

<div class="modalContent">

<h2 id="modalName"></h2>

<img id="modalImg" width="200">

<p id="modalYear"></p>

<p id="modalPrice"></p>

<p id="modalReview"></p>

<button onclick="addToCartModal()">Kosárba</button>

<br><br>

<button onclick="closeModal()">Bezár</button>

</div>

</div>

<div class="modal hidden" id="adminLogin">

<div class="modalContent">

<h2>Admin Login</h2>

<input id="adminPass" type="password" placeholder="Jelszó">

<button onclick="loginAdmin()">Belépés</button>

</div>

</div>

<script>

let cards = [
{
name:"Charizard GX",
price:120,
year:2019,
img:"https://images.pokemontcg.io/base1/4.png",
reviews:"★★★★★"
},
{
name:"Pikachu",
price:40,
year:2021,
img:"https://images.pokemontcg.io/base1/58.png",
reviews:"★★★★"
}
]

let cart = []
let selectedCard=null

function renderCards(){

let container=document.getElementById("cards")
container.innerHTML=""

cards.forEach((c,i)=>{

container.innerHTML+=`

<div class="card" onclick="openCard(${i})">

<img src="${c.img}">

<h3>${c.name}</h3>

<div class="price">$${c.price}</div>

<div class="review">${c.reviews}</div>

</div>

`

})

}

renderCards()

function openCard(i){

selectedCard=cards[i]

document.getElementById("modalName").innerText=selectedCard.name
document.getElementById("modalImg").src=selectedCard.img
document.getElementById("modalYear").innerText="Készült: "+selectedCard.year
document.getElementById("modalPrice").innerText="Ár: $"+selectedCard.price
document.getElementById("modalReview").innerText="Értékelés: "+selectedCard.reviews

document.getElementById("cardModal").classList.remove("hidden")

}

function closeModal(){

document.getElementById("cardModal").classList.add("hidden")

}

function addToCartModal(){

cart.push(selectedCard)

updateCart()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("hidden")

}

function updateCart(){

let c=document.getElementById("cartItems")

c.innerHTML=""

let total=0

cart.forEach(item=>{

c.innerHTML+=`<p>${item.name} - $${item.price}</p>`

total+=item.price

})

document.getElementById("total").innerText="Összesen: $"+total

}

function openAdmin(){

document.getElementById("adminLogin").classList.remove("hidden")

}

function loginAdmin(){

let pass=document.getElementById("adminPass").value

if(pass==="pokemonadmin"){

document.getElementById("adminLogin").classList.add("hidden")
document.getElementById("adminPanel").classList.remove("hidden")

}

else{

alert("Rossz jelszó")

}

}

function addCard(){

let n=document.getElementById("name").value
let p=document.getElementById("price").value
let y=document.getElementById("year").value
let i=document.getElementById("img").value

cards.push({

name:n,
price:p,
year:y,
img:i,
reviews:"★★★★★"

})

renderCards()

}

</script>

</body>
</html>
