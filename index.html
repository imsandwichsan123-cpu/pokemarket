<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pokemarket</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f0f2f5;
text-align:center;
}

/* HEADER */

header{
background:#ffcc00;
padding:20px;
font-size:32px;
font-weight:bold;
position:relative;
}

#onlineUsers{
position:absolute;
right:20px;
top:25px;
font-size:14px;
}

#visitorCount{
position:absolute;
left:20px;
top:25px;
font-size:14px;
}

.logo{
width:180px;
margin:20px auto;
display:block;
}

.tagline{
font-style:italic;
color:#555;
margin-bottom:20px;
}

/* SEARCH */

.search input{
padding:10px;
width:260px;
border-radius:8px;
border:1px solid #ccc;
}

/* CARDS */

.card-list{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.card{
background:white;
width:220px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
position:relative;
}

.card img{
width:100%;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.price{
font-weight:bold;
margin:5px 0;
}

.buy{
background:#ff6600;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* BADGE */

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
font-size:12px;
padding:4px 6px;
border-radius:5px;
}

/* STARS */

.stars{
color:gold;
margin:5px 0;
cursor:pointer;
}

/* CART */

.cartButton{
position:fixed;
top:20px;
right:20px;
background:#ff6600;
color:white;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

.cartPopup{
position:fixed;
top:70px;
right:20px;
background:white;
width:260px;
padding:15px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
display:none;
}

.cartPopup ul{
list-style:none;
}

.cartPopup li{
margin:8px 0;
display:flex;
justify-content:space-between;
}

.cartPopup button{
margin-left:3px;
}

/* ADMIN */

.admin{
position:fixed;
bottom:20px;
right:20px;
background:#333;
color:white;
padding:8px;
border-radius:6px;
cursor:pointer;
}

.adminPanel{
display:none;
background:white;
padding:20px;
margin:40px auto;
width:300px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.adminPanel input{
width:100%;
padding:8px;
margin:5px 0;
}

</style>
</head>

<body>

<header>
pokemarket
<span id="visitorCount"></span>
<span id="onlineUsers"></span>
</header>

<img src="pokemarket_logo.png" class="logo">

<p class="tagline">Where Cards Come to Life!</p>

<div class="search">
<input id="search" placeholder="Search card...">
</div>

<div class="card-list" id="cards"></div>

<button class="cartButton" onclick="toggleCart()">
Cart 🛒 (<span id="cartCount">0</span>)
</button>

<div class="cartPopup" id="cartPopup">

<h3>Kosár</h3>

<ul id="cartItems"></ul>

<p>Total: <span id="totalPrice">0</span> Ft</p>

<button onclick="checkout()">Checkout</button>

</div>

<div class="admin" onclick="toggleAdmin()">Admin</div>

<div class="adminPanel" id="adminPanel">

<h3>Add card</h3>

<input id="name" placeholder="name">
<input id="price" placeholder="price">
<input id="img" placeholder="image url">

<button onclick="addCard()">Add</button>

</div>

<script>

/* VISITORS */

let visits = localStorage.getItem("visits") || 0
visits++
localStorage.setItem("visits",visits)

document.getElementById("visitorCount").innerText =
"Visitors: "+visits

/* ONLINE USERS */

function updateOnline(){

let num = Math.floor(Math.random()*40)+5

document.getElementById("onlineUsers").innerText =
"Online: "+num

}

setInterval(updateOnline,4000)
updateOnline()

/* CARDS */

let cards = [

{
name:"Pikachu",
price:1000,
img:"https://images.pokemontcg.io/base1/58.png",
popular:true,
rating:4
},

{
name:"Charizard",
price:15000,
img:"https://images.pokemontcg.io/base1/4.png",
popular:true,
rating:5
},

{
name:"Bulbasaur",
price:1200,
img:"https://images.pokemontcg.io/base1/44.png",
popular:false,
rating:3
}

]

let cart=[]

function renderCards(filter=""){

let container=document.getElementById("cards")
container.innerHTML=""

cards
.filter(c=>c.name.toLowerCase().includes(filter.toLowerCase()))
.forEach((card,i)=>{

let stars=""

for(let s=1;s<=5;s++){

if(s<=card.rating)
stars+="★"
else
stars+="☆"

}

let badge = card.popular ?
"<div class='badge'>🔥 Popular</div>" : ""

container.innerHTML+=`

<div class="card">

${badge}

<img src="${card.img}">

<h3>${card.name}</h3>

<div class="stars"
onclick="rate(${i})">
${stars}
</div>

<div class="price">
${card.price} Ft
</div>

<button class="buy"
onclick="addToCart(${i})">
Buy
</button>

</div>

`

})

}

renderCards()

/* SEARCH */

document.getElementById("search")
.addEventListener("input",e=>{

renderCards(e.target.value)

})

/* CART */

function toggleCart(){

let cart=document.getElementById("cartPopup")

cart.style.display =
cart.style.display=="block"
? "none":"block"

}

function addToCart(i){

let item=cart.find(c=>c.name==cards[i].name)

if(item)
item.qty++
else
cart.push({...cards[i],qty:1})

renderCart()

}

function renderCart(){

let list=document.getElementById("cartItems")
let total=0

list.innerHTML=""

cart.forEach((c,i)=>{

total+=c.price*c.qty

list.innerHTML+=`

<li>

${c.name} x${c.qty}

<div>

<button onclick="c.qty--;renderCart()">-</button>

<button onclick="c.qty++;renderCart()">+</button>

<button onclick="cart.splice(${i},1);renderCart()">x</button>

</div>

</li>

`

})

document.getElementById("totalPrice").innerText=total

document.getElementById("cartCount").innerText=
cart.reduce((a,b)=>a+b.qty,0)

}

function checkout(){

alert("Order sent! Pay by bank transfer.")

cart=[]

renderCart()

}

/* RATING */

function rate(i){

cards[i].rating=

Math.floor(Math.random()*5)+1

renderCards()

}

/* ADMIN */

function toggleAdmin(){

let a=document.getElementById("adminPanel")

a.style.display=
a.style.display=="block"
?"none":"block"

}

function addCard(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let img=document.getElementById("img").value

cards.push({
name,
price,
img,
popular:false,
rating:3
})

renderCards()

}

</script>

</body>
</html>
