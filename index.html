<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>PokeMarket</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#1a1a1a;
}

.logo{
font-size:24px;
color:#ffd800;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:350px;
height:100%;
background:#1c1c1c;
padding:20px;
transition:0.3s;
}

.cart.open{
right:0;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modalContent{
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}

</style>

</head>

<body>

<header>

<div class="logo">⚡ PokeMarket</div>

<div>

<button onclick="toggleTheme()">🌙</button>

<button onclick="openCart()">🛒</button>

<button onclick="openLogin()">Login</button>

<button onclick="openAdmin()">Admin</button>

</div>

</header>

<div class="grid" id="cards"></div>

<!-- CART -->

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total: $<span id="total">0</span></h3>

<button onclick="closeCart()">Close</button>

</div>

<!-- USER LOGIN -->

<div class="modal" id="loginModal">

<div class="modalContent">

<h3>User Login</h3>

<input id="userName" placeholder="Username"><br><br>

<input id="userPass" type="password" placeholder="Password"><br><br>

<button onclick="loginUser()">Login</button>

<button onclick="registerUser()">Register</button>

</div>

</div>

<!-- ADMIN LOGIN -->

<div class="modal" id="adminModal">

<div class="modalContent">

<h3>Admin Login</h3>

<input id="adminPass" type="password">

<button onclick="adminLogin()">Login</button>

</div>

</div>

<script>

let adminPassword="admin123"

let cart=[]

let cards=[

{
name:"Pikachu V",
price:15,
stock:2,
img:"https://images.pokemontcg.io/swsh4/43.png"
},

{
name:"Surfing Pikachu VMAX",
price:25,
stock:1,
img:"https://images.pokemontcg.io/celebrations/9.png"
},

{
name:"Flying Pikachu VMAX",
price:26,
stock:1,
img:"https://images.pokemontcg.io/celebrations/7.png"
},

{
name:"Umbreon V",
price:35,
stock:1,
img:"https://images.pokemontcg.io/swsh7/94.png"
}

]

function render(){

let grid=document.getElementById("cards")

grid.innerHTML=""

cards.forEach((c,i)=>{

grid.innerHTML+=`

<div class="card">

<img src="${c.img}">

<h3>${c.name}</h3>

<p>$${c.price}</p>

<p>Stock: ${c.stock}</p>

<button onclick="addCart(${i})">Add to cart</button>

</div>

`

})

}

function addCart(i){

if(cards[i].stock<=0){

alert("Out of stock")

return

}

cart.push(cards[i])

cards[i].stock--

updateCart()

render()

}

function updateCart(){

let el=document.getElementById("cartItems")

let total=0

el.innerHTML=""

cart.forEach(c=>{

total+=c.price

el.innerHTML+=`<p>${c.name} - $${c.price}</p>`

})

document.getElementById("total").innerText=total

}

function openCart(){

document.getElementById("cart").classList.add("open")

}

function closeCart(){

document.getElementById("cart").classList.remove("open")

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function openLogin(){

document.getElementById("loginModal").style.display="flex"

}

function openAdmin(){

document.getElementById("adminModal").style.display="flex"

}

function loginUser(){

alert("User logged in")

}

function registerUser(){

alert("User registered")

}

function adminLogin(){

let pass=document.getElementById("adminPass").value

if(pass===adminPassword){

alert("Admin login success")

}else{

alert("Wrong password")

}

}

render()

</script>

</body>
</html>
